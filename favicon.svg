<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#F58F20"/>
  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="16" fill="url(#grad)" opacity=".35"/>
  <!-- 4 grid squares -->
  <rect x="10" y="10" width="18" height="18" rx="4.5" fill="white"/>
  <rect x="36" y="10" width="18" height="18" rx="4.5" fill="white" opacity=".85"/>
  <rect x="10" y="36" width="18" height="18" rx="4.5" fill="white" opacity=".85"/>
  <rect x="36" y="36" width="18" height="18" rx="4.5" fill="white" opacity=".7"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#D97A10"/>
    </linearGradient>
  </defs>
</svg>
