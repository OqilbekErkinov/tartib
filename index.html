<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F58F20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Tartibla</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Auth Container -->
  <div id="authContainer" class="auth-container" style="display: none;"></div>

  <div id="app" style="display: none;">
    <!-- Top Header -->
    <header class="top-header" id="topHeader">
      <div class="header-row1">
        <div class="header-brand-wrap">
          <div class="header-logo-mark">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect width="20" height="20" rx="6" fill="#F58F20"/>
              <rect x="4" y="4" width="5" height="5" rx="1.5" fill="rgba(255,255,255,.92)"/>
              <rect x="11" y="4" width="5" height="5" rx="1.5" fill="rgba(255,255,255,.92)"/>
              <rect x="4" y="11" width="5" height="5" rx="1.5" fill="rgba(255,255,255,.92)"/>
              <rect x="11" y="11" width="5" height="5" rx="1.5" fill="rgba(255,255,255,.92)"/>
            </svg>
          </div>
          <span class="header-brand">Tartibla</span>
        </div>
        <div class="header-date-pill" id="headerDate"></div>
      </div>
      <div class="header-row2">
        <h1 class="page-title" id="pageTitle">Bosh sahifa</h1>
        <button class="header-add-btn" id="headerAction" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="main-content" id="mainContent">
      <!-- Pages are rendered here by JS -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-page="dashboard">
        <div class="nav-inner">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          <span>Asosiy</span>
        </div>
      </button>
      <button class="nav-item" data-page="finance">
        <div class="nav-inner">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="5" width="20" height="14" rx="2.5"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg>
          <span>Moliya</span>
        </div>
      </button>
      <button class="nav-item" data-page="books">
        <div class="nav-inner">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>Kitoblar</span>
        </div>
      </button>
      <button class="nav-item" data-page="habits">
        <div class="nav-inner">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>Odatlar</span>
        </div>
      </button>
      <button class="nav-item" data-page="more">
        <div class="nav-inner">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="5" cy="12" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/><circle cx="19" cy="12" r="1.2" fill="currentColor"/></svg>
          <span>Ko'proq</span>
        </div>
      </button>
    </nav>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="icon-btn" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/finance.js"></script>
  <script src="js/books.js"></script>
  <script src="js/habits.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/subscriptions.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/app.js"></script>

  <!-- Supabase & Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
</body>
</html>
